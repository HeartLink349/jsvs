<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HeartLink | Valentine Special</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0a0f1f;
      --text:#f8fafc;
      --pink:#ff4da6;
      --violet:#8b5cf6;
      --cyan:#22d3ee;
      --shadow: 0 28px 60px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family: "Segoe UI", system-ui, sans-serif; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,77,166,.20), transparent 60%),
        radial-gradient(800px 500px at 80% 20%, rgba(139,92,246,.18), transparent 60%),
        radial-gradient(700px 450px at 40% 85%, rgba(34,211,238,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .glow{
      position:fixed; inset:-100px; pointer-events:none; z-index:-2;
      filter: blur(60px); opacity:.55;
      background:
        radial-gradient(500px 380px at 20% 20%, rgba(255,77,166,.30), transparent 60%),
        radial-gradient(520px 400px at 85% 25%, rgba(139,92,246,.28), transparent 65%),
        radial-gradient(420px 320px at 45% 90%, rgba(34,211,238,.18), transparent 60%);
      animation: floaty 12s ease-in-out infinite alternate;
    }
    @keyframes floaty{
      0%{ transform: translate3d(-1.5%, -1%, 0) scale(1.02); }
      100%{ transform: translate3d(1.8%, 1.2%, 0) scale(1.05); }
    }
    canvas#hearts{ position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.9; }

    .app{ height:100dvh; display:flex; flex-direction:column; }
    header{ height:86px; display:flex; align-items:center; justify-content:center; padding: 14px 18px; }
    .brand{ display:flex; align-items:center; flex-direction: column; gap:4px; min-width:0; text-align: center; }
    .logo{
      width:42px; height:42px; border-radius:14px; display:grid; place-items:center;
      background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      margin-bottom: 4px;
    }
    .logo i{
      font-size:18px;
      background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .brand h1{ margin:0; font-size:15px; font-weight:900; white-space:nowrap; }
    .brand small{ display:block; font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color: rgba(255,255,255,.55); }

    main{ flex:1; padding: 0 16px 18px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .stage{ width:100%; max-width:520px; height: calc(100dvh - 86px - 18px); position:relative; margin: 0 auto; }

    .card{
      width:100%; height:100%;
      border-radius: 30px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      overflow:hidden;
      position:absolute; inset:0;
      transform: translateY(14px) scale(.985);
      opacity:0; pointer-events:none;
      transition: .55s cubic-bezier(.2,.8,.2,1);
    }
    .card.active{ transform: translateY(0) scale(1); opacity:1; pointer-events:auto; }
    .card-inner{ height:100%; overflow-y:auto; overflow-x:hidden; padding: 22px 18px 18px; scrollbar-width:none; display: flex; flex-direction: column; align-items: center; }
    .card-inner::-webkit-scrollbar{ display:none; }

    .hero{ text-align:center; padding: 18px 14px 8px; width: 100%; }
    .hero h2{ margin:0; font-size:28px; font-weight:1000; line-height:1.2; }
    .gradtxt{
      background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }
    .hero p{ margin:10px 0 0; font-size:14px; color: rgba(255,255,255,.78); font-weight:800; }

    .login-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
        width: 100%;
    }

    .panel{
      padding: 16px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,14,30,.45);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    .field{ display:flex; flex-direction: column; gap:15px; align-items:center; }
    .input{
      width: 100%; display:flex; align-items:center; gap:10px; padding: 14px 14px;
      border-radius: 18px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .input i{ color: rgba(255,255,255,.65); }
    input[type="password"]{
      width:100%; border:none; outline:none; background:transparent; color: var(--text);
      font-size:14px; font-weight:800; letter-spacing:.6px; text-align: center;
    }
    input::placeholder{ color: rgba(255,255,255,.55); font-weight:800; }

    .btn{
      border:none; cursor:pointer; padding: 16px 14px; border-radius: 18px; font-weight:1000;
      color:#0b1020; background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 14px 28px rgba(255,77,166,0.22);
      transition: transform .12s ease;
      display:flex; align-items:center; justify-content:center; gap:10px;
      width: 100%; white-space:nowrap; font-size: 16px;
    }
    .btn:active{ transform: scale(.98); }
    .btn.secondary{
      background: rgba(255,255,255,.10);
      color: var(--text);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:none;
      min-width: unset;
      width: auto;
    }
    .hint{ margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.60); font-weight:700; text-align:center; }

    .section-title{ text-align:center; margin: 4px 0 12px; font-size: 18px; font-weight:1000; width: 100%; }
    .timer{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; width: 100%; }
    .tbox{
      padding: 14px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06); text-align:center; position:relative; overflow:hidden;
    }
    .tbox::before{
      content:""; position:absolute; inset:-40px;
      background: radial-gradient(circle at 20% 20%, rgba(255,77,166,.18), transparent 55%),
                radial-gradient(circle at 80% 80%, rgba(139,92,246,.16), transparent 55%);
      filter: blur(18px); opacity:.9;
    }
    .tbox > *{ position:relative; z-index:1; }
    .tval{ font-size: 22px; font-weight:1000; }
    .tlabel{ margin-top: 4px; font-size: 11px; color: rgba(255,255,255,.70); font-weight:900; letter-spacing:1px; text-transform:uppercase; }

    .player{
      margin-top: 14px; padding: 14px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,14,30,.45);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 40px rgba(0,0,0,.30);
      width: 100%;
    }
    .player-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .track{ display:flex; align-items:center; gap:10px; min-width:0; }
    .disc{
      width:42px; height:42px; border-radius:16px;
      background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18));
      border: 1px solid rgba(255,255,255,.12);
      display:grid; place-items:center;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    .disc i{ font-size:16px; background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .track-title{ font-weight:1000; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track-sub{ font-size:11px; color: var(--pink); font-weight:800; margin-top:2px; }

    .pbtn{
      width:48px; height:48px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor:pointer;
      display:grid; place-items:center;
      transition: transform .12s ease;
    }
    .pbtn:active{ transform: scale(.98); }
    .bar{ margin-top: 12px; display:flex; align-items:center; gap:10px; }
    .time{ font-size: 11px; color: rgba(255,255,255,.65); font-weight:900; min-width:42px; text-align:center; }
    .range{ flex:1; height: 10px; border-radius: 999px; background: rgba(255,255,255,.10); position:relative; cursor:pointer; overflow:hidden; }
    .fill{ position:absolute; inset:0 auto 0 0; width:0%; background: linear-gradient(135deg, var(--pink), var(--violet)); border-radius: 999px; }
    .knob{
      position:absolute; top:50%; width: 16px; height:16px; border-radius: 50%;
      background:#fff; transform: translate(-50%, -50%); left: 0%;
      box-shadow: 0 10px 24px rgba(0,0,0,.30);
      border: 3px solid rgba(255,77,166,.35);
      pointer-events:none;
    }
    .player-bottom{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top: 12px; }
    .vwrap{ display:flex; align-items:center; gap:8px; width:45%; }
    .vwrap i{ color: rgba(255,255,255,.7); }
    input[type="range"].vol{ width:100%; accent-color: var(--pink); }

    .headline{ margin: 14px 0 8px; text-align:center; font-size: 18px; font-weight:1000; width: 100%; }

    .grid{ 
      display:flex; 
      flex-direction: column; 
      gap: 20px; 
      margin-top: 12px; 
      width: 100%; 
      align-items: center; 
    }
    .imgcard{
      border-radius: 20px; 
      overflow:hidden; 
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06); 
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      display:flex; 
      flex-direction:column; 
      width: 100%; 
      max-width: 340px; 
      touch-action: pan-y;
    }
    .imgwrap{ position:relative; overflow:hidden; width: 100%; }
    .imgwrap img{ width:100%; height:auto; display:block; transition: transform .7s cubic-bezier(.2,.8,.2,1); object-fit: cover; }
    .imgcard:active img{ transform: scale(1.05); }
    .cap{ padding: 12px 10px 15px; font-size: 14px; font-weight:900; color: rgba(255,255,255,.86); text-align:center; }
    .cap .tiny{ display:block; margin-top:2px; font-size: 11px; font-weight:800; color: rgba(255,255,255,.58); }

    .cta{ margin-top: 14px; display:flex; justify-content:center; width: 100%; }
    .cta .btn{ width:100%; max-width: 360px; min-width: unset; }

    .overlay{
      position:fixed; inset:0;
      background: radial-gradient(800px 500px at 50% 30%, rgba(255,77,166,.16), transparent 55%),
                radial-gradient(800px 520px at 50% 75%, rgba(139,92,246,.16), transparent 60%),
                rgba(0,0,0,.65);
      backdrop-filter: blur(10px);
      display:flex; align-items:center; justify-content:center;
      padding: 18px;
      opacity:0; pointer-events:none;
      transition: opacity .35s ease;
      z-index: 50;
    }
    .overlay.show{ opacity:1; pointer-events:auto; }
    .letter{
      width:min(560px, 100%);
      border-radius: 28px; border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,14,30,.65);
      box-shadow: 0 30px 80px rgba(0,0,0,.65);
      overflow:hidden;
      transform: translateY(10px) scale(.99);
      transition: transform .35s ease;
    }
    .overlay.show .letter{ transform: translateY(0) scale(1); }
    .letter-head{
      padding: 16px 16px 12px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .letter-head .ttl{ font-weight:1000; }
    .xbtn{
      width:40px; height:40px; border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor:pointer;
      display:grid; place-items:center;
    }
    .letter-body{ padding: 18px 16px 18px; }
    .line{
      opacity:0; transform: translateY(10px); filter: blur(4px);
      transition: opacity .55s ease, transform .55s ease, filter .7s ease;
      font-size: 18px; font-weight: 900; line-height: 1.8; text-align:center;
    }
    .line.reveal{ opacity:1; transform: translateY(0); filter: blur(0); }

    .toast{
      position:fixed; left: 50%; bottom: 16px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 14px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(10,14,30,.70);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 50px rgba(0,0,0,.55);
      font-weight: 900;
      font-size: 12px;
      color: rgba(255,255,255,.9);
      opacity:0; pointer-events:none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 60;
    }
    .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
    .toast .warn{
      background: linear-gradient(135deg, #fbbf24, #fb7185);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* ---- لوحة التحكم (مخفية افتراضياً) ---- */
    #dashboard{ position:fixed; inset:0; background:#050505; z-index:9999; padding:20px; overflow-y:auto; display:none; color: white; direction: rtl; }
    .db-section{ background:#111; padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid #333; }
    .db-title{ color:var(--pink); font-weight:bold; margin-bottom:10px; display:block; border-bottom:1px solid #222; padding-bottom:5px; }
    .db-input{ width:100%; background:#1a1a1a; border:1px solid #444; padding:10px; color:#fff; border-radius:8px; margin-bottom:10px; }
    .db-row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .save-btn{ position:sticky; bottom:10px; background:linear-gradient(135deg, #22c55e, #16a34a); color:white; font-size:18px; }

    @media (max-width: 360px){
      .hero h2{ font-size: 26px; }
      .tval{ font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <canvas id="hearts"></canvas>

  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"><i class="fa-solid fa-heart"></i></div>
        <div style="min-width:0">
          <h1 id="mainTitle">HeartLink — Valentine</h1>
          <small id="subHeader">private love page</small>
        </div>
      </div>
    </header>

    <main>
      <div class="stage">

        <section class="card active" id="page1" aria-label="Password Gate">
          <div class="card-inner">
            <div class="hero">
              <h2 id="welcomeMsg"><span class="gradtxt">عيد الحب</span> 🩷</h2>
              <p id="subMsg">جاهزه يروحي 💕</p>
            </div>

            <div class="login-container">
              <div class="panel">
                <div class="field">
                  <div class="input">
                    <i class="fa-solid fa-lock"></i>
                    <input id="pass" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="اكتبي الباسورد ي❤" />
                  </div>
                  <button class="btn" id="enterBtn">
                    دوسي هنا لفتح قلبي
                    <i class="fa-solid fa-arrow-left"></i>
                  </button>
                </div>
              </div>
              <div class="hint" id="hintMsg">💗 لمسة بسيطة… وبعدها هتبدأ الحكاية</div>
            </div>
          </div>
        </section>

        <section class="card" id="page2" aria-label="Valentine Page">
          <div class="card-inner">
            <div class="section-title">
              <span class="gradtxt" id="timerTitle">بداية حكاياتنا</span> ❤😍
            </div>

            <div class="timer" id="timer">
              <div class="tbox"><div class="tval" id="yy">0</div><div class="tlabel">سنين</div></div>
              <div class="tbox"><div class="tval" id="mm">0</div><div class="tlabel">شهور</div></div>
              <div class="tbox"><div class="tval" id="dd">0</div><div class="tlabel">أيام</div></div>
              <div class="tbox"><div class="tval" id="hh">0</div><div class="tlabel">ساعات</div></div>
              <div class="tbox"><div class="tval" id="mi">0</div><div class="tlabel">دقايق</div></div>
              <div class="tbox"><div class="tval" id="ss">0</div><div class="tlabel">ثواني</div></div>
            </div>

            <div class="player" aria-label="Music Player">
              <div class="player-top">
                <div class="track">
                  <div class="disc"><i class="fa-solid fa-music"></i></div>
                  <div style="min-width:0">
                    <div class="track-title" id="trackTitle">أغنيتنا 🎵</div>
                    <div class="track-sub" id="trackSub">بعشقك 😍❤</div>
                  </div>
                </div>
                <button class="pbtn" id="playBtn" aria-label="Play/Pause">
                  <i class="fa-solid fa-pause"></i>
                </button>
              </div>

              <div class="bar">
                <div class="time" id="cur">0:00</div>
                <div class="range" id="seek">
                  <div class="fill" id="fill"></div>
                  <div class="knob" id="knob"></div>
                </div>
                <div class="time" id="dur">0:00</div>
              </div>

              <div class="player-bottom">
                <button class="btn secondary" id="muteBtn" aria-label="Mute/Unmute">
                  <i class="fa-solid fa-volume-high"></i>
                </button>
                <div class="vwrap">
                  <i class="fa-solid fa-volume-low"></i>
                  <input class="vol" id="vol" type="range" min="0" max="1" step="0.01" value="0.85" />
                </div>
              </div>

              <audio id="audio" loop preload="auto" src="https://files.catbox.moe/er4137.mp3"></audio>
            </div>

            <div class="headline"><span class="gradtxt" id="galleryTitle">بحبك انتي وبس</span> 💗</div>

            <div class="grid" id="imageGrid" aria-label="Gallery">
              </div>

            <div class="cta">
              <button class="btn" id="msgBtn">
                دوسي متستعجليش😂❤
                <i class="fa-solid fa-wand-magic-sparkles"></i>
              </button>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="letter" role="dialog" aria-modal="true" aria-label="Message">
      <div class="letter-head">
        <div class="ttl" id="letterHead">رسالة ليكي 💌</div>
        <button class="xbtn" id="closeOverlay" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="letter-body" id="letterBody">
        </div>
    </div>
  </div>

  <div class="toast" id="toast"><span class="warn">😅</span> الباسورد غلط… جربي تاني يا روحي</div>

  <div id="dashboard">
    <h2 class="gradtxt">لوحة التحكم 🛠️</h2>
    <div id="db-content"></div>
    <button class="btn save-btn" onclick="updateFirebase()">حفظ التعديلات ✨</button>
    <button class="btn" style="background:#444; color:#fff; margin-top:10px" onclick="location.href=location.pathname">خروج</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // 1. Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCQhPApGNZsaCDPP7LibF9mJdZjXKJGD_g",
      databaseURL: "https://fatma-bday-site-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('HeartLink_Final_V4');

    // البيانات الافتراضية
    let data = {
      PASSWORD: "22",
      STORY_START: "2022-02-14T00:00:00",
      audioUrl: "https://files.catbox.moe/er4137.mp3",
      mainTitle: "HeartLink — Valentine",
      subHeader: "private love page",
      welcomeMsg: "عيد الحب 🩷",
      subMsg: "جاهزه يروحي 💕",
      hintMsg: "💗 لمسة بسيطة… وبعدها هتبدأ الحكاية",
      timerTitle: "بداية حكاياتنا",
      trackTitle: "أغنيتنا 🎵",
      trackSub: "بعشقك 😍❤",
      galleryTitle: "بحبك انتي وبس",
      btnLetterText: "دوسي متستعجليش😂❤",
      letterHead: "رسالة ليكي 💌",
      lines: ["تغيب الشمس والناس تنام ..", "يغيب القمر ويزيد الظلام ..", "لكن تغيب إنتِ هذا حرام"],
      imgs: [
        {u: "https://files.catbox.moe/vhvc6m.jpg", t1: "إنتِ أجمل صدفة", t2: "في حياتي كلها"},
        {u: "https://files.catbox.moe/o351kp.jpg", t1: "ضحكتك وطن", t2: "وأنا ساكن فيه"},
        {u: "https://files.catbox.moe/5ryowt.jpg", t1: "معاكِ كل حاجة", t2: "بتبقى أحلى"},
        {u: "https://files.catbox.moe/pcqf9h.jpg", t1: "قلبك أمان", t2: "وأنا اختارته"},
        {u: "https://files.catbox.moe/r1z18a.jpg", t1: "كل يوم معاكي", t2: "عيد"},
        {u: "https://files.catbox.moe/z77ibh.jpg", t1: "بحب تفاصيلك", t2: "كلها"}
      ]
    };

    // 2. Sync From Firebase
    db.on('value', (snap) => {
      if(snap.exists()) data = snap.val();
      applyData();
      if(window.location.search.includes('edit')) renderDashboard();
    });

    function applyData() {
      document.getElementById('mainTitle').textContent = data.mainTitle;
      document.getElementById('subHeader').textContent = data.subHeader;
      document.getElementById('welcomeMsg').innerHTML = `<span class="gradtxt">${data.welcomeMsg}</span>`;
      document.getElementById('subMsg').textContent = data.subMsg;
      document.getElementById('hintMsg').textContent = data.hintMsg;
      document.getElementById('timerTitle').textContent = data.timerTitle;
      document.getElementById('trackTitle').textContent = data.trackTitle;
      document.getElementById('trackSub').textContent = data.trackSub;
      document.getElementById('galleryTitle').textContent = data.galleryTitle;
      document.getElementById('msgBtn').innerHTML = `${data.btnLetterText} <i class="fa-solid fa-wand-magic-sparkles"></i>`;
      document.getElementById('audio').src = data.audioUrl;
      document.getElementById('letterHead').textContent = data.letterHead;

      // الصور
      document.getElementById('imageGrid').innerHTML = data.imgs.map(img => `
        <figure class="imgcard">
          <div class="imgwrap"><img src="${img.u}"></div>
          <figcaption class="cap">${img.t1} <span class="tiny">${img.t2}</span></figcaption>
        </figure>
      `).join('');

      // الرسالة
      document.getElementById('letterBody').innerHTML = data.lines.map((l,i) => `
        <div class="line" id="l${i+1}">${l}</div>
      `).join('');
    }

    // 3. Logic Original (Password, Timer, Audio)
    const page1 = document.getElementById("page1");
    const page2 = document.getElementById("page2");
    const passInput = document.getElementById("pass");
    const enterBtn = document.getElementById("enterBtn");
    const audio = document.getElementById("audio");

    enterBtn.addEventListener("click", ()=>{
      if(passInput.value.trim() === data.PASSWORD){
        page1.classList.remove("active");
        page2.classList.add("active");
        audio.play().catch(()=>{});
      }else{
        document.getElementById("toast").classList.add("show");
        setTimeout(()=>document.getElementById("toast").classList.remove("show"), 1700);
      }
    });

    function diffYMDHMS(from, to){
      let start = new Date(from); let end = new Date(to);
      let years = end.getFullYear() - start.getFullYear();
      let test = new Date(start); test.setFullYear(start.getFullYear() + years);
      if(test > end){ years--; test.setFullYear(start.getFullYear() + years); }
      let months = (end.getMonth() - test.getMonth()); if(months < 0) months += 12;
      let test2 = new Date(test); test2.setMonth(test.getMonth() + months);
      if(test2 > end){ months--; test2.setMonth(test.getMonth() + months); }
      let ms = end - test2;
      const sec = 1000, min = 60*sec, hr = 60*min, day = 24*hr;
      const days = Math.floor(ms / day); ms -= days*day;
      const hours = Math.floor(ms / hr); ms -= hours*hr;
      const minutes = Math.floor(ms / min); ms -= minutes*min;
      const seconds = Math.floor(ms / sec);
      return {years, months, days, hours, minutes, seconds};
    }

    setInterval(()=>{
      const d = diffYMDHMS(data.STORY_START, new Date());
      document.getElementById("yy").textContent = d.years;
      document.getElementById("mm").textContent = d.months;
      document.getElementById("dd").textContent = d.days;
      document.getElementById("hh").textContent = String(d.hours).padStart(2,"0");
      document.getElementById("mi").textContent = String(d.minutes).padStart(2,"0");
      document.getElementById("ss").textContent = String(d.seconds).padStart(2,"0");
    }, 1000);

    // Audio Controls
    const playBtn = document.getElementById("playBtn");
    playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
    audio.onplay = () => playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    audio.onpause = () => playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    
    // Seek Bar
    audio.ontimeupdate = () => {
      const p = (audio.currentTime / audio.duration) * 100;
      document.getElementById("fill").style.width = p + "%";
      document.getElementById("knob").style.left = p + "%";
      document.getElementById("cur").textContent = Math.floor(audio.currentTime/60) + ":" + String(Math.floor(audio.currentTime%60)).padStart(2,"0");
    };

    // Overlay
    document.getElementById("msgBtn").onclick = () => {
      document.getElementById("overlay").classList.add("show");
      data.lines.forEach((_, i) => setTimeout(() => document.getElementById(`l${i+1}`).classList.add('reveal'), 300 + i*600));
    };
    document.getElementById("closeOverlay").onclick = () => document.getElementById("overlay").classList.remove("show");

    // 4. Dashboard Logic
    function renderDashboard() {
      document.getElementById('dashboard').style.display = 'block';
      let html = `
        <div class="db-section"><span class="db-title">إعدادات الدخول</span>
          <label>الباسورد</label><input id="db-pass" class="db-input" value="${data.PASSWORD}">
          <label>تاريخ البداية</label><input id="db-date" class="db-input" value="${data.STORY_START}">
        </div>
        <div class="db-section"><span class="db-title">النصوص</span>
          <label>رسالة الترحيب</label><input id="db-welcome" class="db-input" value="${data.welcomeMsg}">
          <label>رابط الأغنية</label><input id="db-audio" class="db-input" value="${data.audioUrl}">
        </div>
        <div class="db-section"><span class="db-title">الصور</span>
          ${data.imgs.map((img, i) => `
            <div style="margin-bottom:15px; border-bottom:1px solid #222">
              <input class="db-img-u db-input" value="${img.u}" placeholder="رابط الصورة">
              <div class="db-row">
                <input class="db-img-t1 db-input" value="${img.t1}" placeholder="نص 1">
                <input class="db-img-t2 db-input" value="${img.t2}" placeholder="نص 2">
              </div>
            </div>
          `).join('')}
        </div>
        <div class="db-section"><span class="db-title">الرسالة</span>
          ${data.lines.map(l => `<input class="db-line db-input" value="${l}">`).join('')}
        </div>
      `;
      document.getElementById('db-content').innerHTML = html;
    }

    window.updateFirebase = function() {
      const newData = {...data};
      newData.PASSWORD = document.getElementById('db-pass').value;
      newData.STORY_START = document.getElementById('db-date').value;
      newData.welcomeMsg = document.getElementById('db-welcome').value;
      newData.audioUrl = document.getElementById('db-audio').value;
      
      newData.imgs = [];
      document.querySelectorAll('.db-img-u').forEach((el, i) => {
        newData.imgs.push({
          u: el.value,
          t1: document.querySelectorAll('.db-img-t1')[i].value,
          t2: document.querySelectorAll('.db-img-t2')[i].value
        });
      });

      newData.lines = [];
      document.querySelectorAll('.db-line').forEach(el => newData.lines.push(el.value));

      db.set(newData).then(() => { alert("تم الحفظ بنجاح! 🎉"); location.reload(); });
    };

    // Canvas Hearts (Original)
    const canvas = document.getElementById("hearts");
    const ctx = canvas.getContext("2d");
    let W, H, DPR;
    const hearts = [];
    function resize(){
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.width = window.innerWidth * DPR;
      H = canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    window.onresize = resize; resize();
    function spawn(){
      hearts.push({x:Math.random()*W, y:-20, s:Math.random()*12+10*DPR, vy:Math.random()*1+1, vx:Math.random()*1-0.5, rot:Math.random()*Math.PI, vr:Math.random()*0.02-0.01});
      if(hearts.length>40) hearts.shift();
    }
    function draw(){
      ctx.clearRect(0,0,W,H);
      hearts.forEach(h => {
        h.y+=h.vy; h.rot+=h.vr;
        ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(h.rot);
        ctx.fillStyle = "rgba(255,77,166,0.6)";
        ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-h.s,-h.s,-h.s*2,h.s/2,0,h.s); ctx.bezierCurveTo(h.s*2,h.s/2,h.s,-h.s,0,0); ctx.fill();
        ctx.restore();
      });
      if(Math.random()<0.05) spawn();
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
